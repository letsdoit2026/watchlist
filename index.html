<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관심종목 현황판</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --up: #b52a2a;
    --dn: #1a4f7a;
    --up-bg: #fdf0f0;
    --dn-bg: #eef4fb;
    --accent: #534ab7;
    --accent-bg: #eeedfe;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  [data-theme="dark"] {
    --bg: #18181a;
    --surface: #232325;
    --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.20);
    --text: #f0efe9;
    --text2: #a0a09a;
    --text3: #606060;
    --up: #e87070;
    --dn: #70aadd;
    --up-bg: #2a1515;
    --dn-bg: #121e2a;
    --accent: #9490e8;
    --accent-bg: #26215c;
  }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 14px; line-height: 1.5;
  }

  /* NAV */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .badge-live {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--up-bg); color: var(--up); font-weight: 600;
    border: 0.5px solid rgba(180,42,42,0.25); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .clock { font-size: 12px; color: var(--text3); font-variant-numeric: tabular-nums; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); }

  /* SUMMARY */
  .summary-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 16px 20px 0; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .stat-card.up-card .stat-value { color: var(--up); }
  .stat-card.dn-card .stat-value { color: var(--dn); }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 14px 20px 10px; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 250px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-input {
    width: 100%; padding: 7px 10px 7px 32px; font-size: 13px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-family: inherit; transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(83,74,183,0.12); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 5px 13px; border-radius: 20px; cursor: pointer;
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); font-family: inherit; transition: all 0.12s;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn.up-filter.active { background: var(--up); border-color: var(--up); color: #fff; }
  .filter-btn.dn-filter.active { background: var(--dn); border-color: var(--dn); color: #fff; }
  .sort-select {
    font-size: 12px; padding: 5px 10px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: var(--surface);
    color: var(--text2); font-family: inherit; cursor: pointer;
  }
  .refresh-all-btn {
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    padding: 5px 13px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); font-family: inherit; cursor: pointer; transition: all 0.12s; margin-left: auto;
  }
  .refresh-all-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .refresh-all-btn .ricon { display: inline-block; transition: transform 0.1s; }
  .refresh-all-btn.spinning .ricon { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GRID — CSS columns 마소니리: 카드가 각자 높이대로 위에서부터 채워짐 */
  .grid { columns: 3; column-gap: 12px; padding: 4px 20px 24px; }
  .section-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); overflow: hidden;
    break-inside: avoid; display: block;
    margin-bottom: 12px; width: 100%;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px 9px; background: var(--surface2); border-bottom: 0.5px solid var(--border);
  }
  .section-header-left { display: flex; align-items: center; gap: 8px; }
  .section-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .section-title {
    font-size: 13px; font-weight: 600; cursor: pointer;
    padding: 1px 4px; border-radius: 4px; transition: background 0.12s;
  }
  .section-title:hover { background: var(--border); }
  .section-title-input {
    font-size: 13px; font-weight: 600; font-family: inherit;
    border: 1px solid var(--accent); border-radius: 4px;
    background: var(--surface); color: var(--text);
    padding: 1px 6px; outline: none; width: 120px;
    box-shadow: 0 0 0 2px rgba(83,74,183,0.15);
  }
  .section-count { font-size: 11px; color: var(--text3); background: var(--bg); padding: 1px 7px; border-radius: 10px; border: 0.5px solid var(--border); }
  .section-header-actions { display: flex; gap: 4px; }
  .add-stock-btn {
    font-size: 11px; padding: 3px 9px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .add-stock-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .del-section-btn {
    width: 22px; height: 22px; border-radius: var(--radius-sm); border: 0.5px solid var(--border);
    background: transparent; color: var(--text3); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.12s;
  }
  .del-section-btn:hover { background: var(--up-bg); color: var(--up); border-color: var(--up); }

  /* TABLE — 고정 레이아웃으로 컬럼 너비 명시 */
  .stock-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .stock-table colgroup col.col-name  { width: 46%; }
  .stock-table colgroup col.col-price { width: 18%; }
  .stock-table colgroup col.col-diff  { width: 18%; }
  .stock-table colgroup col.col-pct   { width: 14%; }
  .stock-table colgroup col.col-act   { width: 4%;  }
  .stock-table th {
    font-size: 11px; color: var(--text3); font-weight: 500;
    padding: 4px 6px; text-align: left; border-bottom: 0.5px solid var(--border);
    overflow: hidden; cursor: pointer; user-select: none; transition: color 0.12s;
  }
  .stock-table th:hover { color: var(--text); }
  .stock-table th.sort-asc, .stock-table th.sort-desc { color: var(--accent); }
  .sort-arrow { font-size: 9px; margin-left: 2px; opacity: 0.7; }
  .stock-table th:first-child { padding-left: 12px; }
  .stock-table th:not(:first-child) { text-align: right; }
  .stock-table th:last-child { padding-right: 10px; }
  .stock-table td {
    font-size: 12px; padding: 5px 6px; border-bottom: 0.5px solid var(--border);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .stock-table td:first-child { padding-left: 12px; }
  .stock-table td:last-child  { padding-right: 6px; }
  .stock-table tr:last-child td { border-bottom: none; }
  .stock-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
  .stock-table tr:hover td { background: var(--surface2); }
  .stock-table tbody tr { cursor: pointer; transition: background 0.1s; }
  /* 종목명 + 티커 한 줄 */
  .name-cell { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .stock-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .stock-ticker-badge { font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .ticker-link { color: var(--text3); text-decoration: none; }
  .ticker-link:hover { color: var(--accent); text-decoration: underline; }
  .up { color: var(--up); }
  .dn { color: var(--dn); }
  .neu { color: var(--text3); }
  /* 행 액션: 삭제만, hover시 표시 */
  .row-acts { display: flex; gap: 4px; justify-content: flex-end; }
  .act-btn {
    width: 16px; height: 16px; border-radius: 3px; border: 0.5px solid var(--border);
    background: transparent; cursor: pointer; font-size: 11px;
    display: none; align-items: center; justify-content: center; transition: all 0.12s;
    color: var(--text3); padding: 0; line-height: 1; flex-shrink: 0;
  }
  .stock-table tr:hover .act-btn { display: flex; }
  .act-btn.del-btn:hover { background: var(--up-bg); color: var(--up); border-color: var(--up); }
  .empty-row td { text-align: center; color: var(--text3); font-size: 12px; padding: 14px; max-width: none; overflow: visible; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 24px; width: 420px; max-width: 93vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; padding: 8px 11px; font-size: 13px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-family: inherit; transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(83,74,183,0.12); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ticker zone */
  .ticker-row { display: flex; gap: 8px; align-items: flex-end; }
  .ticker-row .form-input { flex: 1; font-family: monospace; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; }
  .lookup-btn {
    padding: 8px 16px; border-radius: var(--radius-sm); border: none;
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.12s;
  }
  .lookup-btn:hover { opacity: 0.85; }
  .lookup-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* result preview */
  .result-card {
    display: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    padding: 12px 14px; margin: 8px 0 4px; background: var(--surface2);
  }
  .result-card.show { display: block; }
  .result-name { font-size: 14px; font-weight: 600; }
  .result-code { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .result-price { font-size: 20px; font-weight: 700; margin-top: 8px; letter-spacing: -0.5px; }
  .result-chg { font-size: 12px; margin-top: 3px; }

  .lookup-error {
    display: none; font-size: 11.5px; color: var(--up); padding: 8px 12px;
    background: var(--up-bg); border-radius: var(--radius-sm);
    border: 0.5px solid rgba(180,42,42,0.2); margin: 8px 0 4px; line-height: 1.6;
    white-space: pre-wrap;
  }
  .lookup-error.show { display: block; }
  .lookup-hint { font-size: 11px; color: var(--text3); margin-top: 5px; line-height: 1.6; }
  .divider { display: flex; align-items: center; gap: 0; margin: 14px 0 10px; }
  .divider-line { flex: 1; border-top: 0.5px solid var(--border); }
  .divider-label { font-size: 11px; color: var(--text3); padding: 0 10px; white-space: nowrap; }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { padding: 7px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-family: inherit; font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-submit { padding: 7px 18px; border-radius: var(--radius-sm); background: var(--accent); border: none; color: #fff; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.12s; }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.38; cursor: not-allowed; }

  /* ADD SECTION */
  .add-section-wrap { padding: 0 20px 8px; }
  .add-section-btn {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer;
    padding: 8px 14px; border-radius: var(--radius-sm); border: 0.5px dashed var(--border2);
    background: transparent; font-family: inherit; transition: all 0.12s; width: 100%;
  }
  .add-section-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--text); color: var(--surface); font-size: 13px;
    padding: 9px 18px; border-radius: 20px; z-index: 999;
    transition: transform 0.25s ease; pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .empty-state { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; grid-column: 1/-1; }

  @media (max-width: 960px) {
    .grid { columns: 2; }
  }
  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(2,1fr); }
    .grid { columns: 1; }
    .grid, .toolbar, .summary-bar, .add-section-wrap { padding-left: 12px; padding-right: 12px; }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <span class="logo">📊 관심종목 현황판</span>
    <span class="badge-live" id="market-status">장중</span>
  </div>
  <div class="topbar-right">
    <span class="clock" id="clock">--:--:--</span>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="다크모드">🌙</button>
    <button class="icon-btn" onclick="exportData()" title="JSON 저장">💾</button>
    <button class="icon-btn" onclick="importData()" title="JSON 불러오기">📂</button>
  </div>
</nav>

<div class="summary-bar" id="summary-bar"></div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" placeholder="종목명·티커 검색..." oninput="render()" />
  </div>
  <div class="filter-group" id="filter-bar"></div>
  <select class="sort-select" id="sort" onchange="render()">
    <option value="default">기본 순서</option>
    <option value="pct_desc">등락률 높은순</option>
    <option value="pct_asc">등락률 낮은순</option>
    <option value="price_desc">현재가 높은순</option>
    <option value="price_asc">현재가 낮은순</option>
    <option value="name_asc">종목명순</option>
  </select>
  <button class="refresh-all-btn" onclick="refreshAll()" id="refresh-all-btn">
    <span class="ricon">↻</span> 전체 가격 갱신
  </button>
</div>

<div class="add-section-wrap">
  <button class="add-section-btn" onclick="openAddSection()"><span style="font-size:16px">＋</span> 새 섹션 추가</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-submit" id="modal-submit"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)" />

<script type="module">
// ── NAVER STOCK LINK ──
function openStock(ticker) {
  const url = "https://finance.naver.com/item/main.naver?code=" + ticker;
  const a = document.createElement("a");
  a.href = url; a.target = "_blank"; a.rel = "noopener noreferrer";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// localStorage에 저장된 기존 종목 중 ticker가 없는 것을 DEFAULT_DATA에서 보완
function migrateTickers() {
  const tickerMap = {};
  DEFAULT_DATA.forEach(sec => {
    sec.stocks.forEach(s => { if (s.ticker) tickerMap[s.name] = s.ticker; });
  });
  let changed = false;
  sections.forEach(sec => {
    sec.stocks.forEach(s => {
      if (!s.ticker && tickerMap[s.name]) { s.ticker = tickerMap[s.name]; changed = true; }
    });
  });
  if (changed) saveData();
}

// ── NAVER FINANCE API — prices.json 에서 로드 ──
async function loadPricesJson() {
  try {
    const r = await fetch("prices.json?t=" + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function naverFetch(ticker) {
  const code = ticker.replace(/\D/g, "").padStart(6, "0");
  const url = `https://m.stock.naver.com/api/stock/${code}/basic`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const name  = d.stockName || d.itemName || "";
    const price = parseInt((d.closePrice || "0").toString().replace(/,/g,"")) || 0;
    const diff  = parseInt((d.compareToPreviousClosePrice || "0").toString().replace(/[,+]/g,"")) || 0;
    const pct   = parseFloat((d.fluctuationsRatio || "0").toString().replace(/,/g,"")) || 0;
    if (!name || !price) throw new Error("데이터 없음");
    return { name, price, diff, pct, code };
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// ── REFRESH ALL — prices.json 우선, 없으면 직접 API ──
async function refreshAll() {
  const btn = document.getElementById("refresh-all-btn");
  btn.classList.add("spinning"); btn.disabled = true;
  toast("prices.json 로드 중...", 2000);

  const priceMap = await loadPricesJson();

  if (priceMap) {
    // prices.json 성공 → 바로 적용
    let ok = 0, fail = 0;
    sections.forEach(sec => {
      sec.stocks.forEach(stock => {
        if (!stock.ticker) return;
        const d = priceMap[stock.ticker];
        if (d && d.price) {
          stock.price = d.price; stock.diff = d.diff; stock.pct = d.pct; ok++;
        } else fail++;
      });
    });
    saveData(); renderSummary(); render();
    btn.classList.remove("spinning"); btn.disabled = false;
    toast(fail === 0
      ? `✓ ${ok}종목 갱신 완료 (prices.json)`
      : `✓ ${ok}종목 완료 · ${fail}종목 데이터 없음 (prices.json)`, 4000);
  } else {
    // prices.json 없음 → 직접 API 시도
    toast("prices.json 없음 — 직접 요청 시도 중...", 2000);
    const items = sections.flatMap(s => s.stocks.filter(st => st.ticker).map(st => ({sec:s, stock:st})));
    const tickerSet = [...new Set(items.map(i => i.stock.ticker))];
    const map = {};
    const BATCH = 5;
    for (let i = 0; i < tickerSet.length; i += BATCH) {
      const batch = tickerSet.slice(i, i + BATCH);
      const results = await Promise.allSettled(batch.map(t => naverFetch(t).then(d => ({t, d}))));
      results.forEach(r => { if (r.status === "fulfilled") map[r.value.t] = r.value.d; });
      const done = Math.min(i + BATCH, tickerSet.length);
      toast(`갱신 중... ${done} / ${tickerSet.length}`, 1200);
      if (i + BATCH < tickerSet.length) await new Promise(res => setTimeout(res, 800));
    }
    let ok = 0, fail = 0;
    items.forEach(({stock}) => {
      if (map[stock.ticker]) {
        const d = map[stock.ticker];
        stock.price = d.price; stock.diff = d.diff; stock.pct = d.pct; ok++;
      } else fail++;
    });
    saveData(); renderSummary(); render();
    btn.classList.remove("spinning"); btn.disabled = false;
    toast(fail === 0 ? `✓ ${ok}종목 갱신 완료` : `✓ ${ok}종목 완료 · ${fail}종목 실패`, 4000);
  }
}

// ── CLOCK / STATUS ──
function updateClock() {
  const n = new Date(), p = x => String(x).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${n.getFullYear()}.${p(n.getMonth()+1)}.${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  const m = n.getHours()*60+n.getMinutes(), d = n.getDay();
  const el = document.getElementById("market-status");
  if (d===0||d===6)            { el.textContent="휴장";  el.style.cssText="background:var(--surface2);color:var(--text3)"; }
  else if (m>=9*60&&m<15*60+30){ el.textContent="장중";  el.style.cssText="background:var(--up-bg);color:var(--up)"; }
  else if (m>=8*60&&m<9*60)    { el.textContent="프리장"; el.style.cssText="background:var(--dn-bg);color:var(--dn)"; }
  else                          { el.textContent="장마감"; el.style.cssText="background:var(--surface2);color:var(--text3)"; }
}

// ── SUMMARY ──
function renderSummary() {
  const all = sections.flatMap(s => s.stocks);
  const up = all.filter(s=>s.pct>0).length, dn = all.filter(s=>s.pct<0).length;
  const flat = all.filter(s=>s.pct===0).length;
  const avg = all.length ? all.reduce((a,b)=>a+b.pct,0)/all.length : 0;
  document.getElementById("summary-bar").innerHTML = `
    <div class="stat-card"><div class="stat-label">전체 종목</div><div class="stat-value">${all.length}</div><div class="stat-sub">${sections.length}개 섹션</div></div>
    <div class="stat-card up-card"><div class="stat-label">상승</div><div class="stat-value">${up}</div><div class="stat-sub">종목</div></div>
    <div class="stat-card dn-card"><div class="stat-label">하락</div><div class="stat-value">${dn}</div><div class="stat-sub">종목${flat?` · 보합 ${flat}`:""}</div></div>
    <div class="stat-card"><div class="stat-label">평균 등락률</div><div class="stat-value ${cls(avg)}" style="font-size:18px">${sgn(avg)}${avg.toFixed(2)}%</div><div class="stat-sub">전체 평균</div></div>
  `;
}

// ── FILTERS ──
function renderFilters() {
  document.getElementById("filter-bar").innerHTML =
    `<button class="filter-btn${activeFilter==="all"?" active":""}" onclick="setFilter('all')">전체</button>` +
    sections.map(s=>`<button class="filter-btn${activeFilter===s.key?" active":""}" onclick="setFilter('${s.key}')">${s.label}</button>`).join("") +
    `<button class="filter-btn up-filter${activeFilter==="up"?" active":""}" onclick="setFilter('up')">▲ 상승</button>` +
    `<button class="filter-btn dn-filter${activeFilter==="dn"?" active":""}" onclick="setFilter('dn')">▼ 하락</button>`;
}
function setFilter(k) { activeFilter=k; renderFilters(); render(); }

// ── SORT ──
function sortStocks(stocks) {
  const m = document.getElementById("sort").value, a = [...stocks];
  if (m==="pct_desc") a.sort((x,y)=>y.pct-x.pct);
  else if (m==="pct_asc") a.sort((x,y)=>x.pct-y.pct);
  else if (m==="price_desc") a.sort((x,y)=>y.price-x.price);
  else if (m==="price_asc") a.sort((x,y)=>x.price-y.price);
  else if (m==="name_asc") a.sort((x,y)=>x.name.localeCompare(y.name,"ko"));
  return a;
}

// ── SECTION SORT ──
function sortSection(secKey, col) {
  const cur = sectionSortState[secKey];
  if (cur && cur.col === col) {
    // 같은 컬럼 클릭 → 방향 토글, desc면 초기화
    if (cur.dir === 'asc') sectionSortState[secKey] = { col, dir: 'desc' };
    else delete sectionSortState[secKey];
  } else {
    sectionSortState[secKey] = { col, dir: 'asc' };
  }
  render();
}

function applySectionSort(stocks, secKey) {
  const s = sectionSortState[secKey];
  if (!s) return stocks;
  const arr = [...stocks];
  arr.sort((a, b) => {
    let va, vb;
    if (s.col === 'name')  { va = a.name; vb = b.name; }
    else if (s.col === 'price') { va = a.price; vb = b.price; }
    else if (s.col === 'diff')  { va = a.diff;  vb = b.diff; }
    else if (s.col === 'pct')   { va = a.pct;   vb = b.pct; }
    if (s.col === 'name') return s.dir === 'asc' ? va.localeCompare(vb, 'ko') : vb.localeCompare(va, 'ko');
    return s.dir === 'asc' ? va - vb : vb - va;
  });
  return arr;
}

function sortArrow(secKey, col) {
  const s = sectionSortState[secKey];
  if (!s || s.col !== col) return '<span class="sort-arrow">⇅</span>';
  return `<span class="sort-arrow">${s.dir === 'asc' ? '▲' : '▼'}</span>`;
}

function sortClass(secKey, col) {
  const s = sectionSortState[secKey];
  if (!s || s.col !== col) return '';
  return s.dir === 'asc' ? ' sort-asc' : ' sort-desc';
}
function render() {
  const q = (document.getElementById("search").value||"").trim().toLowerCase();
  const vis = activeFilter==="all"||activeFilter==="up"||activeFilter==="dn"
    ? sections : sections.filter(s=>s.key===activeFilter);
  let html = "";
  vis.forEach(sec => {
    let st = sec.stocks;
    if (q) st = st.filter(s=>s.name.toLowerCase().includes(q)||(s.ticker&&s.ticker.includes(q)));
    if (activeFilter==="up") st = st.filter(s=>s.pct>0);
    if (activeFilter==="dn") st = st.filter(s=>s.pct<0);
    st = sortStocks(st);
    st = applySectionSort(st, sec.key);
    const sk = sec.key;
    html += `<div class="section-card">
      <div class="section-header">
        <div class="section-header-left">
          <div class="section-icon" style="background:var(--accent-bg)">${sec.icon||"📋"}</div>
          <span class="section-title" title="클릭하여 이름 수정" onclick="editSectionName(event,'${sk}')">${sec.label}</span>
          <span class="section-count">${st.length}종목</span>
        </div>
        <div class="section-header-actions">
          <button class="add-stock-btn" onclick="openAddStock('${sk}')">＋ 종목추가</button>
          <button class="del-section-btn" onclick="deleteSection('${sk}')">×</button>
        </div>
      </div>
      <table class="stock-table">
        <colgroup>
          <col class="col-name"><col class="col-price"><col class="col-diff"><col class="col-pct"><col class="col-act">
        </colgroup>
        <thead><tr>
          <th class="${sortClass(sk,'name')}" onclick="sortSection('${sk}','name')">종목명${sortArrow(sk,'name')}</th>
          <th class="${sortClass(sk,'price')}" onclick="sortSection('${sk}','price')">현재가${sortArrow(sk,'price')}</th>
          <th class="${sortClass(sk,'diff')}" onclick="sortSection('${sk}','diff')">전일대비${sortArrow(sk,'diff')}</th>
          <th class="${sortClass(sk,'pct')}" onclick="sortSection('${sk}','pct')">등락률${sortArrow(sk,'pct')}</th>
          <th></th>
        </tr></thead>
        <tbody>`;
    if (!st.length) {
      html += `<tr class="empty-row"><td colspan="5">종목이 없습니다</td></tr>`;
    } else {
      st.forEach(s => {
        const c = cls(s.pct), a = arr(s.pct), sg = sgn(s.pct);
        const rowClick = s.ticker ? `onclick="if(!event.target.closest('.act-btn')&&!event.target.closest('.ticker-link'))openStock('${s.ticker}')"` : "";
        html += `<tr ${rowClick} style="${s.ticker?'cursor:pointer':''}">
          <td><div class="name-cell"><span class="stock-name">${s.name}</span>${s.ticker?`<span class="stock-ticker-badge"><a class="ticker-link" href="https://finance.naver.com/item/main.naver?code=${s.ticker}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${s.ticker}</a></span>`:""}</div></td>
          <td>${fmt(s.price)}</td>
          <td class="${c}">${a}${fmt(Math.abs(s.diff))}</td>
          <td class="${c}">${sg}${s.pct.toFixed(2)}%</td>
          <td><div class="row-acts"><button class="act-btn del-btn" onclick="event.stopPropagation();deleteStock('${sec.key}','${s.name.replace(/'/g,"\\'")}')">×</button></div></td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  });
  document.getElementById("grid").innerHTML = html || `<div class="empty-state">표시할 섹션이 없습니다.</div>`;
}

// ── DELETE ──
function deleteStock(sk, nm) {
  const sec = sections.find(s=>s.key===sk); if (!sec) return;
  if (!confirm(`"${nm}" 을(를) 삭제할까요?`)) return;
  sec.stocks = sec.stocks.filter(s=>s.name!==nm);
  saveData(); renderSummary(); render();
}
function deleteSection(sk) {
  const sec = sections.find(s=>s.key===sk); if (!sec) return;
  if (!confirm(`"${sec.label}" 섹션 전체를 삭제할까요?`)) return;
  sections = sections.filter(s=>s.key!==sk);
  if (activeFilter===sk) activeFilter="all";
  saveData(); renderSummary(); renderFilters(); render();
}

// ── REFRESH SINGLE ──
async function refreshStock(sk, nm) {
  const sec = sections.find(s=>s.key===sk);
  const stock = sec&&sec.stocks.find(s=>s.name===nm);
  if (!stock||!stock.ticker) return;
  const btn = document.getElementById(`rb-${stock.ticker}`);
  if (btn) btn.classList.add("spinning");
  try {
    const d = await naverFetch(stock.ticker);
    stock.price=d.price; stock.diff=d.diff; stock.pct=d.pct;
    saveData(); renderSummary(); render(); toast(`✓ ${stock.name} 갱신 완료`);
  } catch(e) {
    if (btn) btn.classList.remove("spinning");
    toast(`⚠ 갱신 실패 — 네트워크 확인`, 3000);
  }
}

// ── EDIT SECTION NAME (인라인) ──
function editSectionName(e, sk) {
  const span = e.currentTarget;
  const sec = sections.find(s=>s.key===sk);
  if (!sec) return;
  const input = document.createElement("input");
  input.className = "section-title-input";
  input.value = sec.label;
  span.replaceWith(input);
  input.focus(); input.select();

  function commit() {
    const val = input.value.trim() || sec.label;
    sec.label = val;
    saveData(); renderFilters(); render();
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e2 => {
    if (e2.key === "Enter") { e2.preventDefault(); input.blur(); }
    if (e2.key === "Escape") { input.value = sec.label; input.blur(); }
  });
}
function openAddStock(sk) {
  currentSectionKey = sk;
  const sec = sections.find(s=>s.key===sk);
  document.getElementById("modal-title").textContent = `종목 추가 — ${sec.label}`;
  document.getElementById("modal-submit").textContent = "추가";
  document.getElementById("modal-submit").disabled = true;
  document.getElementById("modal-submit").onclick = submitAddStock;

  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label class="form-label">① 종목코드(티커)로 자동 조회</label>
      <div class="ticker-row">
        <input class="form-input" id="f-ticker" placeholder="6자리  예) 473190"
          maxlength="6" inputmode="numeric"
          oninput="this.value=this.value.replace(/\\D/g,'')"
          onkeydown="if(event.key==='Enter'){event.preventDefault();lookupTicker()}" />
        <button class="lookup-btn" id="lbtn" onclick="lookupTicker()">조회</button>
      </div>
      <p class="lookup-hint">코드를 모를 경우 → <a href="https://finance.naver.com/etf/" target="_blank" style="color:var(--accent)">네이버 ETF 목록</a>에서 확인 후 입력하세요.</p>
    </div>
    <div class="result-card" id="rc">
      <div class="result-name" id="rc-name"></div>
      <div class="result-code" id="rc-code"></div>
      <div class="result-price" id="rc-price"></div>
      <div class="result-chg" id="rc-chg"></div>
    </div>
    <div class="lookup-error" id="lerr"></div>
    <div class="divider"><div class="divider-line"></div><span class="divider-label">또는 직접 입력</span><div class="divider-line"></div></div>
    <div class="form-group">
      <label class="form-label">② 종목명 *</label>
      <input class="form-input" id="f-name" placeholder="예: TIGER 코리아AI반도체" oninput="checkSubmit()" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">현재가</label>
        <input class="form-input" id="f-price" type="number" placeholder="예: 17820" oninput="checkSubmit()" />
      </div>
      <div class="form-group">
        <label class="form-label">전일대비</label>
        <input class="form-input" id="f-diff" type="number" placeholder="예: 945 / -100" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">등락률 (%)</label>
      <input class="form-input" id="f-pct" type="number" step="0.01" placeholder="예: 5.60 / -0.46" />
    </div>
  `;
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("f-ticker").focus(), 100);
}

function checkSubmit() {
  const n = (document.getElementById("f-name")?.value||"").trim();
  const p = document.getElementById("f-price")?.value;
  document.getElementById("modal-submit").disabled = !(n && p && parseFloat(p) > 0);
}

async function lookupTicker() {
  const code = (document.getElementById("f-ticker").value||"").trim();
  if (code.length < 4) { showErr("4자리 이상 종목코드를 입력해 주세요."); return; }
  const btn = document.getElementById("lbtn");
  btn.textContent = "조회 중…"; btn.disabled = true;
  document.getElementById("rc").classList.remove("show");
  document.getElementById("lerr").classList.remove("show");

  try {
    const d = await naverFetch(code);
    btn.textContent = "재조회"; btn.disabled = false;

    // 미리보기 카드
    document.getElementById("rc-name").textContent = d.name;
    document.getElementById("rc-code").textContent = `종목코드 ${d.code}`;
    document.getElementById("rc-price").textContent = `${fmt(d.price)}원`;
    document.getElementById("rc-chg").innerHTML =
      `<span class="${cls(d.pct)}">${arr(d.pct)}${fmt(Math.abs(d.diff))} (${sgn(d.pct)}${d.pct.toFixed(2)}%)</span>`;
    document.getElementById("rc").classList.add("show");

    // 폼 자동 채우기
    document.getElementById("f-name").value  = d.name;
    document.getElementById("f-price").value = d.price;
    document.getElementById("f-diff").value  = d.diff;
    document.getElementById("f-pct").value   = d.pct.toFixed(2);
    checkSubmit();
  } catch(e) {
    btn.textContent = "조회"; btn.disabled = false;
    showErr(`조회 실패 (${e.message})\n\n로컬 파일로 여셨다면 CORS 제한이 원인입니다.\n→ 크롬 주소창에 파일 경로를 직접 입력하거나\n→ 직접 입력 필드에 수동으로 입력해 주세요.`);
  }
}

function showErr(msg) {
  const el = document.getElementById("lerr");
  el.textContent = msg; el.classList.add("show");
  document.getElementById("rc").classList.remove("show");
}

function submitAddStock() {
  const ticker = (document.getElementById("f-ticker")?.value||"").trim();
  const name   = (document.getElementById("f-name").value||"").trim();
  const price  = parseFloat(document.getElementById("f-price").value);
  const dv = document.getElementById("f-diff").value;
  const pv = document.getElementById("f-pct").value;
  if (!name) { alert("종목명을 입력해 주세요."); return; }
  if (isNaN(price)||price<=0) { alert("현재가를 입력해 주세요."); return; }
  let diff = parseFloat(dv)||0, pct = parseFloat(pv)||0;
  if (dv&&!pv&&price) pct = parseFloat(((diff/(price-diff))*100).toFixed(2));
  if (pv&&!dv&&price) diff = Math.round(price*pct/(100+pct));
  sections.find(s=>s.key===currentSectionKey).stocks.push({ name, ticker, price, diff, pct });
  saveData(); renderSummary(); render(); closeModal();
  toast(`✓ "${name}" 추가 완료`);
}

// ── MODAL: 섹션 추가 ──
function openAddSection() {
  document.getElementById("modal-title").textContent = "새 섹션 추가";
  document.getElementById("modal-submit").textContent = "섹션 만들기";
  document.getElementById("modal-submit").disabled = false;
  document.getElementById("modal-submit").onclick = submitAddSection;
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label class="form-label">섹션 이름 *</label>
      <input class="form-input" id="s-name" placeholder="예: 관심_반도체" />
    </div>
    <div class="form-group">
      <label class="form-label">아이콘</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="ipick">
        ${["📈","📉","💰","🎯","🔥","⭐","🏦","🌐","🤖","🚀","💎","📋"].map(ic=>
          `<button onclick="pickIcon(this,'${ic}')" style="font-size:20px;padding:4px 8px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;background:transparent">${ic}</button>`
        ).join("")}
      </div>
      <input class="form-input" id="s-icon" value="📋" style="margin-top:8px" />
    </div>
  `;
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("s-name").focus(), 100);
}
function pickIcon(btn, ic) {
  document.getElementById("s-icon").value = ic;
  document.querySelectorAll("#ipick button").forEach(b=>b.style.background="transparent");
  btn.style.background = "var(--accent-bg)";
}
function submitAddSection() {
  const name = document.getElementById("s-name").value.trim();
  const icon = document.getElementById("s-icon").value.trim()||"📋";
  if (!name) { alert("섹션 이름을 입력해 주세요."); return; }
  sections.push({ key:"sec_"+uid(), label:name, icon, stocks:[] });
  saveData(); renderSummary(); renderFilters(); render(); closeModal();
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  currentSectionKey = null;
}

// ── THEME ──
function toggleTheme() {
  const d = document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme", d?"light":"dark");
  document.getElementById("theme-btn").textContent = d?"🌙":"☀️";
  localStorage.setItem("wl_theme", d?"light":"dark");
}

// ── EXPORT / IMPORT ──
function exportData() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(sections,null,2)],{type:"application/json"}));
  a.download = `관심종목_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importData() { document.getElementById("import-input").click(); }
function handleImport(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!Array.isArray(d)) throw 0;
      if (!confirm(`${d.length}개 섹션 불러오기. 현재 데이터를 덮어쓸까요?`)) return;
      sections=d; saveData(); activeFilter="all";
      renderSummary(); renderFilters(); render(); toast("✓ 데이터 불러오기 완료");
    } catch { alert("올바른 JSON 파일이 아닙니다."); }
  };
  r.readAsText(f); e.target.value="";
}

// ── KEYBOARD ──
document.addEventListener("keydown", e => {
  if (e.key==="Escape") closeModal();
  if (e.key==="/"&&!document.getElementById("modal").classList.contains("open")) {
    e.preventDefault(); document.getElementById("search").focus();
  }
});
document.getElementById("modal").addEventListener("click", e => {
  if (e.target===document.getElementById("modal")) closeModal();
});

// ── INIT ──
const t = localStorage.getItem("wl_theme")||"light";
document.documentElement.setAttribute("data-theme", t);
document.getElementById("theme-btn").textContent = t==="dark"?"☀️":"🌙";

// onclick 핸들러에서 접근할 수 있도록 전역 등록
window.sortSection = sortSection;
window.setFilter = setFilter;
window.openAddStock = openAddStock;
window.openAddSection = openAddSection;
window.deleteStock = deleteStock;
window.deleteSection = deleteSection;
window.closeModal = closeModal;
window.lookupTicker = lookupTicker;
window.checkSubmit = checkSubmit;
window.submitAddStock = submitAddStock;
window.submitAddSection = submitAddSection;
window.pickIcon = pickIcon;
window.toggleTheme = toggleTheme;
window.exportData = exportData;
window.importData = importData;
window.handleImport = handleImport;
window.refreshAll = refreshAll;
window.openStock = openStock;
window.editSectionName = editSectionName;

(async () => {
  await loadData();
  renderSummary(); renderFilters(); render();
  updateClock(); setInterval(updateClock, 1000);
})();
</script>
